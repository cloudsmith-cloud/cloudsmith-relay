version: "3.9"

services:
  relay:
    image: ghcr.io/cloudsmith-cloud/cloudsmith-relay:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudsmith-relay
    restart: unless-stopped
    ports:
      # local LAN listener for Agents
      - "8443:8443"
    environment:
      RELAY_PAAS_URL: ${RELAY_PAAS_URL:?set RELAY_PAAS_URL (e.g. https://api.cloudsmith.cloud)}
      RELAY_ENROLLMENT_TOKEN: ${RELAY_ENROLLMENT_TOKEN:-}
      RELAY_DISPLAY_NAME: ${RELAY_DISPLAY_NAME:-site-relay}
      RELAY_CLUSTER_ID: ${RELAY_CLUSTER_ID:-demo}
      RELAY_LISTEN_PORT: ${RELAY_LISTEN_PORT:-8443}
      RELAY_IDENTITY_DIR: /var/lib/cloudsmith-relay/identity
      Logging__LogLevel__Default: Information
    volumes:
      # Persisted Relay identity (private key + identity.json) — survives restart.
      - cloudsmith-relay-identity:/var/lib/cloudsmith-relay/identity

volumes:
  cloudsmith-relay-identity:
